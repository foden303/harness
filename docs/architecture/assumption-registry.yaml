version: 1
updated_at: "2026-03-30"
entries:
  - id: independent-review-before-complete
    component: harness-work
    kind: workflow-contract
    assumption: "The person who wrote the implementation cannot reliably catch all the gaps in their own changes."
    model_limit_addressed: "Self-evaluation bias"
    retirement_signal: "A single-model run sustains a defect-detection rate equal to one with independent review, across multiple rounds."
    validation: "Compare the defect escape rate of Solo vs Breezing."
  - id: sprint-contract-before-worker
    component: sprint-contract
    kind: artifact
    assumption: "The DoD in Plans.md alone leaves success criteria coarse, and implementation and review tend to run on different standards."
    model_limit_addressed: "Insufficient goal resolution"
    retirement_signal: "The DoD alone drops the rework rate to the same level as with a contract."
    validation: "Compare the number of fix loops with vs without a contract."
  - id: structured-handoff-artifact
    component: context-reset
    kind: state-transfer
    assumption: "In long-running execution, a summary-only handoff drops the next action and the reason for failure."
    model_limit_addressed: "Context anxiety and handoff degradation"
    retirement_signal: "A resume after compaction does not increase the incompletion rate or the re-explanation cost."
    validation: "Track first-action latency and handoff-deficiency counts after resume."
  - id: runtime-review-profile
    component: reviewer-profile-runtime
    kind: evaluator
    assumption: "Static review alone cannot sufficiently catch changes that break when run."
    model_limit_addressed: "Static-analysis blind spots"
    retirement_signal: "The defect escape rate is sufficiently low even without runtime execution."
    validation: "Compare the number of test-caused misses with vs without runtime profile execution."
  - id: browser-review-profile
    component: reviewer-profile-browser
    kind: evaluator
    assumption: "Broken user screens and operation defects are hard to judge from code diffs alone."
    model_limit_addressed: "Blind spots in visual/operational quality"
    retirement_signal: "Static + runtime alone keeps the UI-bug escape rate within an acceptable range."
    validation: "Measure the follow-up count of UI defects before and after introducing the browser evaluator."
