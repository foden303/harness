# cross-project-groups.yaml
#
# Purpose:
#   Definition of target groups for cross-project memory search.
#   Opt-in via the --cross-project-group <name> flag from the
#   harness-plan-brief / harness-accept / harness-progress skills.
#
# Schema: cross-project-group.v1
#   {schema_version, groups: [{name, members[], description?}]}
#
# Default:
#   groups: []  <- cross-project search disabled (explicit opt-in)
#
# Update Rules:
#   1. groups are explicitly opt-in, default empty (so cross-project search
#      does not run by accident)
#   2. groups[].name must be unique within groups
#   3. elements within groups[].members must be unique (no duplicates)
#   4. an invalid schema causes scripts/load-cross-project-groups.sh to exit 1
#   5. Full spec: docs/cross-project-groups-schema.md
#
# Cross-Project Search Flow:
#   client (skill) -> convert yaml to JSON via load-cross-project-groups.sh
#   -> issue one memory search call per member project
#      (the search API takes a single project, so N calls are required)
#   -> merge / dedupe / relevance_score sort the results client-side
#   -> redact proper nouns with the client-redaction.yaml dictionary
#

schema_version: cross-project-group.v1

groups: []

