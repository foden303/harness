# client-redaction.yaml
#
# Purpose:
#   SSOT for client-side dictionary-based proper-noun redaction.
#   Dictionary definition for replacing proper nouns such as client names,
#   person names, and domains with [Client_*] / [Person_*] / [Domain_*]
#   in retrieved memory text before it is rendered or shared.
#
# Schema: client-redaction.v1
#
# Default:
#   clients: [], people: [], domains: []  (all redaction disabled)
#
# Update Rules:
#   1. opt-in default: an empty dict does nothing (prevents false redaction)
#   2. rule_id must be unique (unique across clients/people/domains)
#   3. name is a literal string match (not regex; proper-noun dict)
#   4. aliases are synonyms/abbreviations (optional)
#   5. replace_with is the post-redaction token (e.g. "[Client_A]")
#   6. Full spec: docs/cross-project-groups-schema.md (sibling doc)
#
# Fields:
#   rule_id        unique identifier for the rule
#   name           literal string to match (not a regex)
#   aliases[]      optional synonyms / abbreviations, also matched literally
#   replace_with   the post-redaction token
#
# Double-substitution guard:
#   Text that already contains sentinel marks such as `[REDACTED_*]`,
#   `[Entity]`, `[Client_*]`, `[Person_*]`, `[Domain_*]` is excluded from
#   redaction, so already-redacted content is never rewritten a second time.
#   The sentinel regex is [A-Za-z0-9_]+ and matches both upper and lower case.
#

schema_version: client-redaction.v1

clients: []
people: []
domains: []

# ---- Configuration example (commented-out template) ----
#
# clients:
#   - rule_id: client-001
#     name: NoraiCorp
#     aliases:
#       - Norai Corp
#       - Norai Inc.
#     replace_with: "[Client_A]"
#
#   - rule_id: client-002
#     name: YorozuPro
#     replace_with: "[Client_B]"
#
# people:
#   - rule_id: person-001
#     name: Jonathan Blackwood
#     aliases:
#       - Blackwood
#     replace_with: "[Person_A]"
#
# domains:
#   - rule_id: domain-001
#     name: example.com
#     replace_with: "[Domain_A]"
