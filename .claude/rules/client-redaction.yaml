#   - rule_id: person-001
#     name: Jonathan Blackwood
#     aliases:
#       - Blackwood
#     replace_with: "[Person_A]"
#
# domains:
#   - rule_id: domain-001
#     name: example.com
#     replace_with: "[Domain_A]"
