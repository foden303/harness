# Harness v4 Configuration
# Edit this file, then run `harness sync` to generate CC plugin files.

[project]
name = "harness"
version = "1.0.0"
description = "Claude harness - A harness for solo developers (Vibecoders) to handle full-cycle contract development."
homepage = "https://github.com/foden303/harness"
repository = "https://github.com/foden303/harness"
license = "MIT"
keywords = ["claude-code", "plugin", "vibecoder", "workflow", "plan-work-review"]
outputStyles = "./output-styles/"

[project.author]
name = "Foden"
url = "https://github.com/foden303"

[env]
CLAUDE_CODE_SUBPROCESS_ENV_SCRUB = "1"

[safety.permissions]
# How to handle direct pushes to main/master.
# ask: confirm with the user before executing (default) / deny: forbid / allow: permit without confirmation
protectedBranchPush = "ask"
allow = [
  # Low-risk local development commands. Keep install, arbitrary npx/npm exec,
  # merge/rebase, destructive git, secrets, and external sends behind ask/deny.
  "Bash(git status:*)",
  "Bash(git diff:*)",
  "Bash(git log:*)",
  "Bash(git branch:*)",
  "Bash(git show:*)",
  "Bash(rg:*)",
  "Bash(npm test:*)",
  "Bash(npm run test:*)",
  "Bash(npm run lint:*)",
  "Bash(npm run build:*)",
  "Bash(bun test:*)",
  "Bash(bun run test:*)",
  "Bash(bun run lint:*)",
  "Bash(bun run build:*)",
  "Bash(pnpm test:*)",
  "Bash(pnpm run test:*)",
  "Bash(pnpm run lint:*)",
  "Bash(pnpm run build:*)",
  "Bash(yarn test:*)",
  "Bash(yarn run test:*)",
  "Bash(yarn run lint:*)",
  "Bash(yarn run build:*)",
]
deny = [
  "Bash(sudo:*)",
  "Bash(rm -rf:*)",
  "Bash(rm -fr:*)",
  "Bash(psql:*)",
  "Bash(mysql:*)",
  "Bash(mongod:*)",
  "Bash(mongo:*)",
  "mcp__codex__*",
  # Self-modification prevention: forbid Write/Edit to settings files (CLAUDE.md Permission Boundaries).
  # harness sync generates .claude-plugin/settings.json. Direct editing is not allowed.
  "Edit(.claude/settings*)",
  "Write(.claude/settings*)",
  "Edit(.claude-plugin/settings*)",
  "Write(.claude-plugin/settings*)",
  "Read(./.env)",
  "Read(./.env.*)",
  "Read(./secrets/**)",
  "Read(**/*.pem)",
  "Read(**/*.key)",
  "Read(**/*id_rsa*)",
  "Read(**/*id_ed25519*)",
  "Read(**/.aws/**)",
  "Read(**/.ssh/**)",
  "Read(**/.npmrc)",
]
ask = [
  "Bash(rm -r:*)",
  "Bash(git reset --hard:*)",
  "Bash(git push -f:*)",
  "Bash(git push --force:*)",
  "Bash(git push --force-with-lease:*)",
  "Bash(git clean -f:*)",
  "Bash(git clean -fdx:*)",
  "Bash(git clean -fx:*)",
  "Bash(git rebase:*)",
  "Bash(git merge:*)",
  "Bash(npm install:*)",
  "Bash(npm exec:*)",
  "Bash(npx:*)",
  "Bash(bun install:*)",
  "Bash(pnpm install:*)",
]

# Optional R03 break-glass: shell writes to exact/narrow .env paths ask instead
# of deny only when this TOML entry has a non-empty reason. R02 Write/Edit/
# MultiEdit and hard-deny paths (.git/, secrets/, *.pem, *.key, SSH trust,
# shell rc/profile, .claude/hooks, .husky) remain denied.
# [[safety.guardrail.protectedPathAskList]]
# path = ".env"
# reason = "customer deploy env update"

[safety.sandbox]
failIfUnavailable = true

[safety.sandbox.network]
# SSOT for .claude-plugin/settings.json deniedDomains. Phase 62.1.4 baseline:
# 3 cloud-metadata exfil endpoints + 6 paste-site/file-host endpoints.
# Keep this aligned with templates/claude/settings.security.json.template.
# Editing settings.json directly is denied by self-protection — update HERE
# and run `bin/harness sync` to regenerate.
deniedDomains = [
  "169.254.169.254",
  "metadata.google.internal",
  "metadata.azure.com",
  "pastebin.com",
  "transfer.sh",
  "0x0.st",
  "paste.ee",
  "termbin.com",
  "ix.io",
]

[safety.sandbox.filesystem]
denyRead = [
  ".env",
  ".env.*",
  "!.env.example",
  "secrets/**",
  "**/*.pem",
  "**/*.key",
  "**/*id_rsa*",
  "**/*id_ed25519*",
  "**/.aws/**",
  "**/.ssh/**",
]
allowRead = [
  ".env.example",
  ".env.sample",
  "config/public-*",
  "docs/**",
]

[tdd]
adopt_todo_list_first = true
adopt_triangulation = "guide-only"
adopt_fake_implementation = false

[tdd.enforce]
# Local trial safe default: no behavior changes until explicitly enabled.
enabled = false
level = "off"                            # "off" | "central" | "max"
hook_enabled = false                     # Only fires when level == "max".
default_max_red_log_age_minutes = 60
bypass_audit_required = true

# The rule set the Worker self-verifies before commit. The Worker returns
# `worker-report.v1` with each self_review[] entry filled as
# {rule, verified: true, evidence: "<actual command output>"}. If even one rule has
# verified=false or evidence="", the Lead auto-returns it to the Worker without
# spawning the Reviewer (max 2 times within the same session; escalate on the 3rd).
# To add project-specific rules, append to the `extra_rules` array (independent of the default 6).
# `tdd-red-evidence-attached` is enabled only when [tdd.enforce].enabled = true.
[worker.self_review]
default_rules = [
  "dry-violation-none",                  # Zero DRY violations (share implementation and imports)
  "plans-cc-markers-untouched",          # Plans.md cc:* markers unmodified
  "all-declared-symbols-called",         # Every declared function/class has a call path
  "dod-items-verified-with-evidence",    # Each DoD item has a verification method and evidence
  "no-existing-test-regression",         # No regression in existing tests
  "tdd-red-evidence-attached",           # active only when [tdd.enforce].enabled = true
]
extra_rules = []                         # List project-specific rules here if you want to add any
max_retries_before_escalate = 2          # Escalate to the Lead on the 3rd return
