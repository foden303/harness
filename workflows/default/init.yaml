# /harness-init workflow definition (formerly: init)
# Adds the workflow to a new or existing project
# The actual initialization logic is handled by skills/harness-init/

phase: init
description: "Initialize a project and set up the development workflow"

steps:
  # Step 1: Project analysis (tri-state determination)
  # Project analysis is performed within the harness-init skill's execution-flow.md
  - id: analyze-project
    skill: harness-init
    input:
      files:
        - README.md
        - package.json
        - AGENTS.md
        - CLAUDE.md
        - Plans.md
      context_from:
        - repo_tree
        - git_status
    output:
      variables:
        - project_type      # new | existing | ambiguous
        - ambiguity_reason  # null | template_only | few_files | readme_only | scaffold_only
        - tech_stack
        - code_file_count
    mode: required

  # Step 1.5: Confirm ambiguous cases (only when ambiguous)
  # Handled within the harness-init skill's interactive flow
  - id: clarify-project-type
    skill: harness-init
    condition: "project_type == 'ambiguous'"
    input:
      context_from:
        - ambiguity_reason
        - code_file_count
        - tech_stack
    output:
      variables:
        - project_type  # resolved to new | existing by user choice
    mode: required

  # Step 2: Gather requirements (for new projects)
  # Handled within the harness-init skill's interactive flow
  - id: init-requirements
    skill: harness-init
    condition: "project_type == 'new'"
    input:
      context_from:
        - user_prompt
        - previous_step_output
    output:
      variables:
        - project_name
        - tech_choice
        - initial_tasks
    mode: required

  # Step 3: Generate the project (for new projects)
  # Handled by the harness-init skill's scaffolding functionality
  - id: scaffold-project
    skill: harness-init
    condition: "project_type == 'new'"
    input:
      variables:
        - project_name
        - tech_choice
      context_from:
        - config_file  # harness.config.json
    output:
      update_files:
        - package.json
        - src/
    mode: required

  # Step 4: Generate workflow files
  # Defined in the harness-init skill's generated-files.md
  - id: generate-workflow-files
    skill: harness-init
    input:
      templates:
        - templates/AGENTS.md.template
        - templates/CLAUDE.md.template
        - templates/Plans.md.template
      context_from:
        - project_context
    output:
      create_files:
        - AGENTS.md
        - CLAUDE.md
        - Plans.md
    mode: required

  # Step 4.5: Initialize memory (SSOT)
  # Handled by the memory skill
  - id: init-memory-ssot
    skill: memory
    input:
      templates:
        - templates/memory/decisions.md.template
        - templates/memory/patterns.md.template
        - templates/memory/session-log.md.template
    output:
      create_files:
        - .claude/memory/decisions.md
        - .claude/memory/patterns.md
        - .claude/memory/session-log.md
    mode: optional

  # Step 5: Review the plan (optional)
  # Handled by the planning skill
  - id: review-plan
    skill: planning
    input:
      files:
        - Plans.md
    mode: optional

  # Step 6: Guide to the next action
  - id: next-action-guide
    skill: vibecoder-guide
    input:
      context_from:
        - completed_steps
        - plans_md
    output:
      user_message: true
    mode: required

# Output on success
on_success:
  message: |
    ✅ Project initialized!

    What to do next:
    - "Run it" → start the development server
    - "Start Phase 1" → run the first task
    - "Show me the plan" → review Plans.md

# Output on error
on_error:
  message: |
    ⚠️ An error occurred during initialization.

    Check the details and say "try again".
